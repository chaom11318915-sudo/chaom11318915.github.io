<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單元詳情 | 2026 AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* 清爽專業漸層背景 */
        body {
            background: linear-gradient(135deg, #2a4a72 0%, #3a6293 50%, #6e9bc4 100%);
            background-attachment: fixed;
            color: #2d3748;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 柔和光點背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 20%, rgba(201, 162, 39, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 85% 80%, rgba(189, 195, 199, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 35%);
            z-index: -1;
            pointer-events: none;
        }

        /* 導航列 */
        .navbar {
            background: rgba(30, 60, 114, 0.9) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 162, 39, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-brand {
            color: #d6a92c !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.95) !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #d6a92c !important;
        }

        /* Unit Navigation Styles */
        .unit-nav-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .unit-nav-left {
            left: 20px;
        }

        .unit-nav-right {
            right: 20px;
        }

        .unit-nav-btn {
            background: rgba(58, 98, 147, 0.9);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(201, 162, 39, 0.3);
            backdrop-filter: blur(10px);
        }

        .unit-nav-btn:hover {
            background: #d6a92c;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(201, 162, 39, 0.5);
        }

        .unit-nav-btn:disabled {
            background: rgba(91, 101, 115, 0.5);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
            box-shadow: none;
        }

        .unit-nav-btn:disabled:hover {
            transform: none;
            background: rgba(91, 101, 115, 0.5);
        }

        /* Unit Info Tooltip */
        .unit-nav-tooltip {
            position: absolute;
            background: rgba(42, 74, 114, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1001;
            border: 1px solid rgba(201, 162, 39, 0.3);
        }

        .unit-nav-left .unit-nav-tooltip {
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
        }

        .unit-nav-right .unit-nav-tooltip {
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
        }

        .unit-nav-btn:hover .unit-nav-tooltip {
            opacity: 1;
        }

        /* Unit Counter */
        .unit-counter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(58, 98, 147, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(201, 162, 39, 0.3);
            border: 1px solid rgba(201, 162, 39, 0.2);
        }

        /* Keyboard Navigation Hint */
        .keyboard-hint {
            position: fixed;
            top: 120px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #2a4a72;
            z-index: 999;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(201, 162, 39, 0.3);
            opacity: 0;
            animation: fadeInHint 0.5s ease 2s forwards;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeInHint {
            to { opacity: 1; }
        }

        .keyboard-hint .hint-close {
            position: absolute;
            top: -5px;
            right: 5px;
            background: none;
            border: none;
            font-size: 1rem;
            color: #5b6573;
            cursor: pointer;
        }

        /* Project Header */
        .project-header {
            background: transparent;
            padding: 120px 0 40px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #3a6293 !important;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            border: 1px solid rgba(201, 162, 39, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .back-btn:hover {
            background: white;
            color: #d6a92c !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 162, 39, 0.3);
        }

        .breadcrumb {
            background: transparent;
            padding: 1rem 0;
        }

        .breadcrumb-item {
            color: rgba(255, 255, 255, 0.8);
        }

        .breadcrumb-item a {
            color: white;
            text-decoration: none;
        }

        .breadcrumb-item a:hover {
            color: #d6a92c;
        }

        .breadcrumb-item.active {
            color: #d6a92c;
        }

        .project-title {
            color: white !important;
            font-weight: 700;
            font-size: 2.5rem;
            margin-top: 1rem;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .project-subtitle {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* Content Section */
        .content-section {
            margin-bottom: 3rem;
        }

        .section-title {
            color: #d6a92c !important;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(201, 162, 39, 0.4);
        }

        /* Image Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(201, 162, 39, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(201, 162, 39, 0.3);
            border-color: #d6a92c;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .gallery-overlay {
            padding: 1.5rem;
        }

        .gallery-overlay h5 {
            color: #2a4a72;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .gallery-overlay p {
            color: #3a6293;
            margin-bottom: 0.5rem;
        }

        /* Badge 樣式 */
        .badge {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .bg-primary {
            background: linear-gradient(135deg, #3a6293 0%, #2a4a72 100%) !important;
            color: white !important;
        }

        .bg-success {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%) !important;
            color: white !important;
        }

        .bg-warning {
            background: linear-gradient(135deg, #f0d878 0%, #d6a92c 100%) !important;
            color: white !important;
        }

        .bg-secondary {
            background: linear-gradient(135deg, #bdc3c7 0%, #5b6573 100%) !important;
            color: white !important;
        }

        /* Modal */
        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            border: 1px solid rgba(201, 162, 39, 0.3);
        }

        .modal-header {
            border-bottom: 1px solid rgba(201, 162, 39, 0.2);
        }

        .modal-title {
            color: #2a4a72;
            font-weight: 600;
        }

        .upload-time {
            font-size: 0.85rem;
            color: #2d3748; /* 加深顏色以提高可見度 */
            font-weight: 500;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .upload-time i {
            font-size: 0.9rem;
            color: #3a6293;
        }

        #modalUploadTime {
            color: #2d3748;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .unit-nav-container {
                position: fixed;
                top: auto;
                bottom: 100px;
                transform: none;
            }

            .unit-nav-left {
                left: 20px;
            }

            .unit-nav-right {
                right: 20px;
            }

            .unit-nav-btn {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }

            .unit-nav-tooltip {
                display: none;
            }

            .unit-counter {
                bottom: 20px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .keyboard-hint {
                display: none;
            }

            .project-title {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">2026 AI</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#home">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#about">關於我</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#projects">我的專案</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#contact">聯絡我</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Unit Navigation - Left -->
    <div class="unit-nav-container unit-nav-left">
        <button class="unit-nav-btn" id="prevUnitBtn" onclick="navigateToUnit(currentUnit - 1)">
            <i class="fas fa-chevron-left"></i>
            <div class="unit-nav-tooltip" id="prevUnitTooltip">單元 1</div>
        </button>
    </div>

    <!-- Unit Navigation - Right -->
    <div class="unit-nav-container unit-nav-right">
        <button class="unit-nav-btn" id="nextUnitBtn" onclick="navigateToUnit(currentUnit + 1)">
            <i class="fas fa-chevron-right"></i>
            <div class="unit-nav-tooltip" id="nextUnitTooltip">單元 3</div>
        </button>
    </div>

    <!-- Unit Counter -->
    <div class="unit-counter" id="unitCounter">
        單元 1 / 12
    </div>

    <!-- Keyboard Navigation Hint -->
    <div class="keyboard-hint" id="keyboardHint">
        <button class="hint-close" onclick="closeHint()">&times;</button>
        💡 使用 ← → 鍵快速切換單元
    </div>

    <!-- Project Header -->
    <section class="project-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
                <div>
                    <a href="index.html#projects" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                        <span>返回專案列表</span>
                    </a>

                    <nav aria-label="breadcrumb" class="mt-3">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a href="index.html">首頁</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a href="index.html#projects">專案</a>
                            </li>
                            <li class="breadcrumb-item active" id="breadcrumb-unit">單元</li>
                        </ol>
                    </nav>

                    <h1 class="project-title" id="project-title">單元</h1>
                    <p class="project-subtitle" id="project-subtitle">
                        單元作業
                    </p>
                </div>
                <div class="mb-4">
                    <button class="btn btn-outline-light rounded-pill px-4" id="updateDatesBtn" onclick="syncDatesFromGitHub()">
                        <i class="fas fa-sync-alt me-2"></i> 同步 GitHub 更新
                    </button>
                    <div id="syncStatus" class="text-white-50 mt-2 text-end" style="font-size: 0.75rem;"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <div class="container">
        <!-- Image Gallery -->
        <section class="content-section fade-in">
            <h2 class="section-title">作業相簿</h2>
            <div class="image-gallery">
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Images will be dynamically generated -->
                </div>
            </div>
        </section>
    </div>

    <!-- Image Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="imageModalTitle">專案圖片</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="專案圖片" class="img-fluid rounded mb-3">
                    <div id="modalUploadTime" class="upload-time justify-content-center"></div>
                    <p id="imageDescription" class="mt-2"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUnit = 1;
        let images = [];
        const totalUnits = 12;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Get unit number from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            currentUnit = parseInt(urlParams.get('unit')) || 1;

            // Validate unit number (1-12)
            if (currentUnit < 1 || currentUnit > totalUnits) {
                currentUnit = 1;
            }

            // Update page title and content
            updatePageContent();

            // Show a temporary loading state while we probe for images
            const galleryGrid = document.getElementById('gallery-grid');
            if (galleryGrid) {
                galleryGrid.innerHTML = '<div class="text-center text-white py-5"><i class="fas fa-spinner fa-spin me-2"></i>偵測圖片中...</div>';
            }

            // Generate images for this unit (動態偵測有幾張圖), then load metadata & render
            generateImages().then(() => {
                loadMetadata().then(() => {
                    // Render gallery
                    renderGallery();

                    // Fetch dates after elements are in DOM (fallback)
                    images.forEach((img, idx) => fetchImageDate(img, idx));
                });
            });

            // Update navigation
            updateNavigation();

            initScrollAnimations();
            initKeyboardNavigation();
        });

        let imageMetadata = {};

        function loadMetadata() {
            // 嘗試載入由 Python 腳本產生的資料檔案
            return fetch('../image_metadata.json')
                .then(res => res.json())
                .then(data => { 
                    imageMetadata = data; 
                    console.log("已從 JSON 載入 MetaData");
                })
                .catch(err => {
                    console.warn("未能在上層目錄找到 image_metadata.json，試圖在本地目錄尋找...");
                    return fetch('image_metadata.json')
                        .then(res => res.json())
                        .then(data => { imageMetadata = data; })
                        .catch(() => console.warn("找不到 Metadata JSON，將採回 HEAD 請求方式。"));
                });
        }

        // 當使用者按一下 Update 按鈕時，直接呼叫 GitHub API 更新當前單元的日期
        async function syncDatesFromGitHub() {
            const btn = document.getElementById('updateDatesBtn');
            const status = document.getElementById('syncStatus');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> 同步中...';
            status.textContent = '正在向 GitHub 查詢最新的提交資訊...';

            let count = 0;
            // 僅針對當前單元的圖片進行更新，避免觸發 API 頻率限制
            for (let i = 0; i < images.length; i++) {
                const img = images[i];
                const fileName = img.src.split('/').pop();
                const filePath = `pic/${fileName}`;
                
                try {
                    // 呼叫 GitHub Commits API 
                    const apiURL = `https://api.github.com/repos/ntust2026/ntust2026.github.io/commits?path=${filePath}&page=1&per_page=1`;
                    const response = await fetch(apiURL);
                    
                    if (response.ok) {
                        const commits = await response.json();
                        if (commits && commits.length > 0) {
                            const dateStr = commits[0].commit.committer.date;
                            const dt = new Date(dateStr);
                            const formattedDate = dt.toLocaleString('zh-TW', {
                                year: 'numeric', month: '2-digit', day: '2-digit',
                                hour: '2-digit', minute: '2-digit', second: '2-digit',
                                hour12: false
                            });
                            
                            // 更新內存與 UI
                            img.lastModified = formattedDate;
                            imageMetadata[fileName] = formattedDate;
                            updateDateUI(i, formattedDate);
                            count++;
                        }
                    } else if (response.status === 403) {
                        status.textContent = 'GitHub API 呼叫頻率達上限，請一小時後再試。';
                        break;
                    }
                } catch (e) {
                    console.error('GitHub Sync Error:', e);
                }
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i> 同步 GitHub 更新';
            if (status.textContent.indexOf('上限') === -1) {
                status.textContent = `同步完成！已更新 ${count} 張圖片的時間。`;
                setTimeout(() => { status.textContent = ''; }, 3000);
            }
        }


        // Unit information with names and attributes
        const unitInfo = {
            1: { name: "課程簡介、安裝github.io", attributes: [] },
            2: { name: "Claude AI, Claude Cowork, Claude Code", attributes: [] },
            3: { name: "Skills 製作與設定、Claude Skills 應用", attributes: [] },
            4: { name: "OpenAI Codex", attributes: [] },
            5: { name: "OpenAI 記憶、技能與外掛插件", attributes: [] },
            6: { name: "Google Gemini Skills", attributes: [] },
            7: { name: "GoogleFlow", attributes: [] },
            8: { name: "N8N 工作流自動化", attributes: [] },
            9: { name: "N8N 工作流自動化進階", attributes: [] },
            10: { name: "地端 Ollama, Cloudflare, Docker", attributes: [] },
            11: { name: "所有的地端整合（含LINE、FB、What's App）", attributes: [] },
            12: { name: "期末報告", attributes: [] }
        };

        // Navigate to specific unit
        function navigateToUnit(unitNumber) {
            if (unitNumber >= 1 && unitNumber <= totalUnits && unitNumber !== currentUnit) {
                window.location.href = `unit.html?unit=${unitNumber}`;
            }
        }

        // Update navigation buttons and tooltips
        function updateNavigation() {
            const prevBtn = document.getElementById('prevUnitBtn');
            const nextBtn = document.getElementById('nextUnitBtn');
            const prevTooltip = document.getElementById('prevUnitTooltip');
            const nextTooltip = document.getElementById('nextUnitTooltip');
            const unitCounter = document.getElementById('unitCounter');

            // Update counter
            unitCounter.textContent = `單元 ${currentUnit} / ${totalUnits}`;

            // Update previous button
            if (currentUnit > 1) {
                prevBtn.disabled = false;
                const prevUnit = unitInfo[currentUnit - 1];
                prevTooltip.textContent = `單元 ${currentUnit - 1}: ${prevUnit.name}`;
            } else {
                prevBtn.disabled = true;
                prevTooltip.textContent = '已經是第一個單元';
            }

            // Update next button
            if (currentUnit < totalUnits) {
                nextBtn.disabled = false;
                const nextUnit = unitInfo[currentUnit + 1];
                nextTooltip.textContent = `單元 ${currentUnit + 1}: ${nextUnit.name}`;
            } else {
                nextBtn.disabled = true;
                nextTooltip.textContent = '已經是最後一個單元';
            }
        }

        // Initialize keyboard navigation
        function initKeyboardNavigation() {
            document.addEventListener('keydown', function(e) {
                // Ignore if user is typing in an input field
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return;
                }

                switch(e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        if (currentUnit > 1) {
                            navigateToUnit(currentUnit - 1);
                        }
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        if (currentUnit < totalUnits) {
                            navigateToUnit(currentUnit + 1);
                        }
                        break;
                    case 'Home':
                        e.preventDefault();
                        navigateToUnit(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        navigateToUnit(totalUnits);
                        break;
                }
            });
        }

        // Close keyboard hint
        function closeHint() {
            document.getElementById('keyboardHint').style.display = 'none';
        }

        // Update page content based on unit number
        function updatePageContent() {
            const unit = unitInfo[currentUnit];
            const unitText = `單元 #${currentUnit}`;
            const unitFullTitle = `${unitText}: ${unit.name}`;
            const subtitleText = `單元 ${currentUnit} 作業`;
            const titleText = `${unitFullTitle} - 專案詳情 | 2026 AI`;

            // Update page title
            document.title = titleText;

            // Update breadcrumb
            document.getElementById('breadcrumb-unit').textContent = unitFullTitle;

            // Update project title
            document.getElementById('project-title').textContent = unitFullTitle;

            // Update project subtitle
            document.getElementById('project-subtitle').textContent = subtitleText;
        }

        // Generate images array for current unit
        // 檢查圖片是否存在
        function checkImageExists(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = src;
            });
        }

        // 依序偵測 pic/unit{N}_1.jpg, _2.jpg... 直到找不到為止
        // 若完全沒有對應圖片，則改用 pic/no.jpg 顯示一張預設圖
        async function generateImages() {
            const unit = unitInfo[currentUnit];
            images = [];

            let i = 1;
            const maxCheck = 30; // 安全上限，避免無止盡偵測
            while (i <= maxCheck) {
                const src = `pic/unit${currentUnit}_${i}.jpg`;
                const exists = await checkImageExists(src);
                if (!exists) break;

                images.push({
                    src: src,
                    title: `${unit.name} - 圖片 ${i}`,
                    description: `單元 #${currentUnit}: ${unit.name} 作業圖片 ${i}`,
                    lastModified: '讀取中...'
                });
                i++;
            }

            // 找不到任何對應圖片時，顯示預設圖
            if (images.length === 0) {
                images.push({
                    src: 'pic/no.jpg',
                    title: `${unit.name} - 尚無圖片`,
                    description: `單元 #${currentUnit}: ${unit.name} 目前尚未上傳作業圖片`,
                    lastModified: '未知'
                });
            }
        }

        // 獲取圖片檔案最後修改時間
        function fetchImageDate(imageData, index) {
            const fileName = imageData.src.split('/').pop();
            
            // 優先從 JSON 中提取時間（對應使用者要求的 Last Commit Date）
            if (imageMetadata[fileName]) {
                console.log(`從 JSON 匹配到 ${fileName} 的日期`);
                imageData.lastModified = imageMetadata[fileName];
                updateDateUI(index, imageData.lastModified);
                return;
            }

            // 如果 JSON 沒找到，才嘗試 HEAD 請求
            fetch(imageData.src, { method: 'HEAD' })
                .then(response => {
                    const lastModified = response.headers.get('Last-Modified');
                    if (lastModified) {
                        const date = new Date(lastModified);
                        imageData.lastModified = date.toLocaleString('zh-TW', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit', second: '2-digit', 
                            hour12: false
                        });
                    } else {
                        imageData.lastModified = '未知';
                    }
                    updateDateUI(index, imageData.lastModified);
                })
                .catch(() => {
                    imageData.lastModified = '未知';
                    updateDateUI(index, imageData.lastModified);
                });
        }

        // 獨立更新 UI 的函數
        function updateDateUI(index, timeStr) {
            const dateEl = document.getElementById(`upload-time-${index}`);
            if (dateEl) {
                dateEl.innerHTML = `<i class="far fa-clock"></i> 最後提交: ${timeStr}`;
            }
        }

        // Render gallery based on current unit
        function renderGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            const unit = unitInfo[currentUnit];

            galleryGrid.innerHTML = images.map((image, index) => {
                const title = image.title;
                const fileName = image.src.split('/').pop().replace(/\.[^.]+$/, '');

                return `
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(${index})">
                        <img src="${image.src}" alt="單元 ${currentUnit} - 圖片 ${index + 1}">
                        <div class="gallery-overlay">
                            <h5>${fileName}</h5>
                            <p>${unit.name}</p>
                            <div class="upload-time" id="upload-time-${index}">
                                <i class="far fa-clock"></i> 最後提交: ${image.lastModified}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show image in modal
        function showImage(index) {
            const image = images[index];
            const modalImage = document.getElementById('modalImage');
            const imageDescription = document.getElementById('imageDescription');
            const modalUploadTime = document.getElementById('modalUploadTime');

            modalImage.src = image.src;
            imageDescription.textContent = image.description;
            modalUploadTime.innerHTML = `<i class="far fa-clock"></i> 最後提交: ${image.lastModified}`;
        }

        // Scroll animations
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    const headerOffset = 70;
                    const elementPosition = target.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Navbar background on scroll
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255,255,255,0.98)';
            } else {
                navbar.style.background = 'rgba(255,255,255,0.95)';
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch(`YoutubeLink/unit${currentUnit}.txt`)
                .then(response => {
                    if (!response.ok) throw new Error("No YouTube link found.");
                    return response.text();
                })
                .then(text => {
                    const firstLine = text.trim().split('\n')[0];
                    if (firstLine.includes("youtube") || firstLine.includes("youtu.be")) {
                        const videoId = firstLine.includes("youtu.be")
                            ? firstLine.split("youtu.be/")[1]
                            : firstLine.split("v=")[1].split("&")[0];
                        const iframeHTML = `
                            <div class="container mt-5 mb-5">
                                <div class="ratio ratio-16x9">
                                    <iframe src="https://www.youtube.com/embed/${videoId}" 
                                            title="YouTube video" allowfullscreen></iframe>
                                </div>
                            </div>`;
                        document.body.insertAdjacentHTML("beforeend", iframeHTML);
                    }
                })
                .catch(err => {
                    console.log("No YouTube video for this unit.");
                });
        });
    </script>

</body>
</html>
